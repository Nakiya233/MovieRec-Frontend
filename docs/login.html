<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieRec - 登录注册</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        accent: '#18181B',
        'accent-hover': '#3F3F46',
        surface: '#FAFAFA',
        border: '#E4E4E7',
        'text-secondary': '#52525B',
        'text-muted': '#A1A1AA',
      },
      fontFamily: {
        heading: ['Archivo', 'sans-serif'],
        body: ['Space Grotesk', 'sans-serif'],
      },
    },
  },
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { background: #FFFFFF; }
  .input-field { background: #FAFAFA; border: 1px solid #E4E4E7; transition: all 0.2s ease; border-radius: 4px; }
  .input-field:focus { border-color: #18181B; box-shadow: 0 0 0 1px rgba(24,24,27,0.1); outline: none; }
  .btn-primary { background: #18181B; color: #FFFFFF; transition: all 0.2s ease; border-radius: 4px; }
  .btn-primary:hover { background: #3F3F46; }
  .btn-outline { border: 1px solid #E4E4E7; color: #18181B; transition: all 0.2s ease; border-radius: 4px; }
  .btn-outline:hover { border-color: #18181B; background: #FAFAFA; }
  .tab-active { color: #09090B; border-bottom: 2px solid #18181B; }
  .tab-inactive { color: #A1A1AA; border-bottom: 2px solid transparent; transition: all 0.2s ease; }
  .tab-inactive:hover { color: #52525B; }
  .divider-line { background: #E4E4E7; height: 1px; }
  .checkbox-custom { accent-color: #18181B; }
</style>
</head>
<body class="font-body min-h-screen flex">

<!-- Left: Brand Panel -->
<div class="hidden lg:flex lg:w-5/12 bg-[#18181B] text-white flex-col justify-between p-12 relative overflow-hidden">
  <div>
    <div class="flex items-center gap-3 mb-16">
      <svg class="w-8 h-8" viewBox="0 0 24 24" fill="currentColor"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
      <span class="font-heading text-2xl tracking-tight">MovieRec</span>
    </div>
    <div class="max-w-sm">
      <p class="text-4xl font-heading font-semibold leading-tight mb-6">发现你的下一部最爱电影</p>
      <p class="text-base text-[#A1A1AA] leading-relaxed">基于 AI 算法的智能推荐系统，精准匹配你的观影偏好。超过 10,000 部影片等你探索。</p>
    </div>
  </div>

  <div class="flex gap-2 text-xs text-[#71717A]">
    <span>© 2026 MovieRec</span>
    <span>·</span>
    <a href="#" class="hover:text-white transition-colors duration-200">隐私政策</a>
    <span>·</span>
    <a href="#" class="hover:text-white transition-colors duration-200">用户协议</a>
  </div>
</div>

<!-- Right: Form Panel -->
<div class="flex-1 flex items-center justify-center p-8">
  <div class="w-full max-w-md">

    <!-- Mobile Logo -->
    <div class="lg:hidden flex items-center gap-2 mb-10">
      <svg class="w-7 h-7" viewBox="0 0 24 24" fill="#18181B"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
      <span class="font-heading text-xl tracking-tight text-[#09090B]">MovieRec</span>
    </div>

    <!-- Tab Switcher -->
    <div class="flex gap-8 mb-10">
      <button id="tab-login" class="tab-active pb-2 text-sm font-semibold cursor-pointer" onclick="switchTab('login')">登录</button>
      <button id="tab-register" class="tab-inactive pb-2 text-sm font-semibold cursor-pointer" onclick="switchTab('register')">注册</button>
    </div>

    <!-- Login Form -->
    <form id="form-login" class="space-y-5">
      <div>
        <label class="block text-xs font-medium text-[#52525B] mb-2">邮箱地址</label>
        <input type="email" placeholder="your@email.com" class="input-field w-full px-4 py-3 text-sm text-[#09090B] placeholder-[#A1A1AA]">
      </div>
      <div>
        <div class="flex items-center justify-between mb-2">
          <label class="text-xs font-medium text-[#52525B]">密码</label>
          <a href="#" class="text-xs text-[#52525B] hover:text-[#18181B] transition-colors duration-200">忘记密码？</a>
        </div>
        <input type="password" placeholder="••••••••" class="input-field w-full px-4 py-3 text-sm text-[#09090B] placeholder-[#A1A1AA]">
      </div>
      <div>
        <label class="flex items-center gap-2 text-sm text-[#52525B] cursor-pointer">
          <input type="checkbox" class="checkbox-custom"> 记住我
        </label>
      </div>
      <button type="submit" class="btn-primary w-full py-3 text-sm font-semibold cursor-pointer active:scale-[0.99]">
        登 录
      </button>
    </form>

    <!-- Register Form -->
    <form id="form-register" class="space-y-5 hidden">
      <div>
        <label class="block text-xs font-medium text-[#52525B] mb-2">用户名</label>
        <input type="text" placeholder="您的昵称" class="input-field w-full px-4 py-3 text-sm text-[#09090B] placeholder-[#A1A1AA]">
      </div>
      <div>
        <label class="block text-xs font-medium text-[#52525B] mb-2">邮箱地址</label>
        <input type="email" placeholder="your@email.com" class="input-field w-full px-4 py-3 text-sm text-[#09090B] placeholder-[#A1A1AA]">
      </div>
      <div>
        <label class="block text-xs font-medium text-[#52525B] mb-2">密码</label>
        <input type="password" placeholder="至少 8 位字符" class="input-field w-full px-4 py-3 text-sm text-[#09090B] placeholder-[#A1A1AA]">
      </div>
      <div>
        <label class="block text-xs font-medium text-[#52525B] mb-2">确认密码</label>
        <input type="password" placeholder="再次输入密码" class="input-field w-full px-4 py-3 text-sm text-[#09090B] placeholder-[#A1A1AA]">
      </div>
      <button type="submit" class="btn-primary w-full py-3 text-sm font-semibold cursor-pointer active:scale-[0.99]">
        注 册
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center gap-4 my-8">
      <div class="flex-1 divider-line"></div>
      <span class="text-xs text-[#A1A1AA]">或</span>
      <div class="flex-1 divider-line"></div>
    </div>

    <!-- Social Login -->
    <div class="flex gap-3">
      <button class="btn-outline flex-1 flex items-center justify-center gap-2 py-2.5 text-sm cursor-pointer">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
      <button class="btn-outline flex-1 flex items-center justify-center gap-2 py-2.5 text-sm cursor-pointer">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        GitHub
      </button>
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  var loginTab = document.getElementById('tab-login');
  var registerTab = document.getElementById('tab-register');
  var loginForm = document.getElementById('form-login');
  var registerForm = document.getElementById('form-register');
  if (tab === 'login') {
    loginTab.className = 'tab-active pb-2 text-sm font-semibold cursor-pointer';
    registerTab.className = 'tab-inactive pb-2 text-sm font-semibold cursor-pointer';
    loginForm.classList.remove('hidden');
    registerForm.classList.add('hidden');
  } else {
    registerTab.className = 'tab-active pb-2 text-sm font-semibold cursor-pointer';
    loginTab.className = 'tab-inactive pb-2 text-sm font-semibold cursor-pointer';
    loginForm.classList.add('hidden');
    registerForm.classList.remove('hidden');
  }
}
</script>
</body>
</html>
